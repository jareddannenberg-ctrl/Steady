<style>
  :root{
    --bg1:#FDF6EF; --bg2:#F4EFFF;
    --card:#FFFFFF; --ink:#3D3A50; --ink-soft:#8B87A3;
    --purple:#7A6BF0; --purple-deep:#5D4EDB; --purple-soft:#EDE9FF;
    --peach:#FFB48A; --peach-deep:#F09055; --peach-soft:#FFF0E4;
    --mint:#3ECF8E; --mint-deep:#2BAE74; --mint-soft:#E2F8EE;
    --sun:#FFD166; --sun-soft:#FFF6DC;
    --rose:#FF8FA3; --rose-soft:#FFE9EE;
    --sky:#5AC8FA; --sky-soft:#E3F4FE;
    --danger:#E86A5E;
    --shadow:0 6px 20px rgba(96,80,180,.10);
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;}
  body{
    background:linear-gradient(170deg,var(--bg1) 0%, var(--bg2) 100%) fixed;
    color:var(--ink); font-family:'Nunito',sans-serif; -webkit-font-smoothing:antialiased; min-height:100vh;
  }
  .wrap{ max-width:560px; margin:0 auto; padding:26px 20px 118px; }
  h1,h2,h3{ margin:0; font-weight:800; color:var(--ink); letter-spacing:-.01em; }
  .lede{ color:var(--ink-soft); font-size:15.5px; line-height:1.55; margin-top:10px; font-weight:600; }
  .small{ color:var(--ink-soft); font-size:13px; line-height:1.55; font-weight:600; }
  .eyebrow{ font-size:13px; font-weight:800; color:var(--purple); text-transform:none; margin-bottom:6px; }

  button{ font-family:'Nunito',sans-serif; cursor:pointer; border:none; }
  .btn{ display:inline-flex; align-items:center; justify-content:center; gap:8px;
    background:var(--purple); color:#fff; font-weight:800; font-size:16px;
    padding:15px 28px; border-radius:999px; box-shadow:0 4px 0 var(--purple-deep);
    transition:transform .08s ease, box-shadow .08s ease; }
  .btn:active{ transform:translateY(3px); box-shadow:0 1px 0 var(--purple-deep); }
  .btn:disabled{ background:#D9D5EA; box-shadow:0 4px 0 #C4BFDD; cursor:not-allowed; }
  .btn.mint{ background:var(--mint); box-shadow:0 4px 0 var(--mint-deep); }
  .btn.mint:active{ box-shadow:0 1px 0 var(--mint-deep); }
  .btn.peach{ background:var(--peach-deep); box-shadow:0 4px 0 #D3763D; }
  .btn.sm{ font-size:14px; padding:11px 20px; }
  .btn-soft{ background:#fff; color:var(--purple); font-weight:800; font-size:14.5px; padding:12px 20px; border-radius:999px; border:2px solid var(--purple-soft); }
  .btn-text{ background:none; color:var(--ink-soft); font-weight:800; font-size:14px; padding:10px 6px; }
  .btn-danger{ background:none; color:var(--danger); font-weight:800; font-size:13.5px; padding:8px 0; }
  .btn-row{ display:flex; gap:12px; margin-top:26px; align-items:center; flex-wrap:wrap; }
  .full{ width:100%; }

  .card{ background:var(--card); border-radius:24px; padding:20px; margin-bottom:14px; box-shadow:var(--shadow); border:none; }
  .card.tint{ box-shadow:none; }

  .option{ display:flex; align-items:center; gap:14px; width:100%; text-align:left;
    background:#fff; border:2.5px solid #EFEBFA; border-radius:20px; padding:16px 18px; margin-bottom:11px;
    font-size:15.5px; color:var(--ink); transition:border-color .12s, background .12s, transform .08s; }
  .option:active{ transform:scale(.985); }
  .option.selected{ border-color:var(--purple); background:var(--purple-soft); }
  .opt-emoji{ font-size:24px; flex-shrink:0; }
  .opt-label{ font-weight:800; }
  .opt-sub{ color:var(--ink-soft); font-size:13px; margin-top:2px; font-weight:600; line-height:1.4; }

  .qbar{ height:14px; background:#EBE6F7; border-radius:999px; overflow:hidden; margin-bottom:26px; }
  .qbar > div{ height:100%; background:linear-gradient(90deg,var(--mint),var(--purple)); border-radius:999px; transition:width .35s ease; }

  .likert{ background:#fff; border-radius:20px; padding:18px; margin-bottom:12px; box-shadow:var(--shadow); }
  .likert p{ margin:0 0 12px; font-size:15.5px; font-weight:700; line-height:1.45; }
  .likert-scale{ display:flex; gap:8px; }
  .likert-scale button{ flex:1; padding:13px 0; background:#F5F2FC; border:2.5px solid transparent; border-radius:16px; font-weight:800; font-size:15px; color:var(--ink-soft); }
  .likert-scale button.selected{ background:var(--purple); color:#fff; }
  .likert-ends{ display:flex; justify-content:space-between; margin-top:7px; font-size:11.5px; color:var(--ink-soft); font-weight:700; }

  textarea, input[type=text], input[type=time]{ width:100%; font-family:'Nunito',sans-serif; font-size:15px; font-weight:600; color:var(--ink);
    background:#fff; border:2.5px solid #EFEBFA; border-radius:18px; padding:14px 16px; margin-top:8px; }
  textarea{ resize:vertical; min-height:70px; }
  textarea:focus, input:focus{ outline:none; border-color:var(--purple); }
  label.f{ display:block; font-size:13.5px; font-weight:800; color:var(--ink); margin-top:18px; }
  label.f .hint{ font-weight:600; color:var(--ink-soft); }

  nav.tabs{ position:fixed; bottom:0; left:0; right:0; background:#fff; display:flex; z-index:10;
    padding:8px 6px calc(8px + env(safe-area-inset-bottom)); border-radius:26px 26px 0 0; box-shadow:0 -6px 24px rgba(96,80,180,.12); }
  nav.tabs button{ flex:1; background:none; padding:8px 0 6px; display:flex; flex-direction:column; align-items:center; gap:2px;
    font-size:9.5px; font-weight:800; color:#B9B4CE; border-radius:14px; }
  nav.tabs button .ico{ font-size:19px; filter:grayscale(1) opacity(.55); transition:filter .15s; }
  nav.tabs button.active{ color:var(--purple); background:var(--purple-soft); }
  nav.tabs button.active .ico{ filter:none; }

  .emoji-row{ display:flex; gap:9px; margin-top:12px; }
  .emoji-btn{ flex:1; padding:13px 0 9px; background:#fff; border:2.5px solid #EFEBFA; border-radius:18px; font-size:26px; display:flex; flex-direction:column; align-items:center; gap:2px; }
  .emoji-btn span.lbl{ font-size:10px; font-weight:800; color:var(--ink-soft); }
  .emoji-btn.selected{ border-color:var(--purple); background:var(--purple-soft); transform:scale(1.04); }

  .p-card{ border-radius:24px; padding:18px; margin-bottom:14px; display:flex; gap:14px; align-items:flex-start; }
  .p-emoji{ width:46px; height:46px; border-radius:16px; background:rgba(255,255,255,.75); display:flex; align-items:center; justify-content:center; font-size:24px; flex-shrink:0; }
  .p-title{ font-weight:800; font-size:16.5px; }
  .p-meta{ font-size:12px; font-weight:800; color:var(--ink-soft); margin-top:1px; }
  .p-body{ font-size:13.5px; color:#6B6784; line-height:1.55; margin-top:7px; font-weight:600; }
  .check{ width:30px; height:30px; border-radius:50%; border:3px solid #D9D4EC; background:#fff; flex-shrink:0; position:relative; margin-top:4px; }
  .check.on{ background:var(--mint); border-color:var(--mint); }
  .check.on::after{ content:''; position:absolute; left:9px; top:4px; width:6px; height:13px; border-right:3.5px solid #fff; border-bottom:3.5px solid #fff; transform:rotate(40deg); border-radius:2px; }

  .banner{ border-radius:22px; padding:16px 18px; margin-bottom:14px; display:flex; gap:12px; align-items:flex-start; font-size:13.5px; font-weight:700; line-height:1.5; }
  .banner .be{ font-size:22px; }

  .rings-wrap{ display:flex; justify-content:center; margin:10px 0 2px; }
  .stat-grid{ display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-top:16px; }
  .stat{ background:#fff; border-radius:20px; padding:16px; text-align:center; box-shadow:var(--shadow); }
  .stat-num{ font-size:26px; font-weight:900; }
  .stat-label{ font-size:11px; font-weight:800; color:var(--ink-soft); margin-top:2px; }

  .badge{ display:inline-flex; align-items:center; gap:6px; background:#fff; border-radius:999px; padding:8px 14px; font-size:12.5px; font-weight:800; margin:0 8px 8px 0; box-shadow:var(--shadow); }
  .badge.locked{ opacity:.38; filter:grayscale(1); box-shadow:none; background:#F1EEF9; }

  .entry-row{ background:#fff; border-radius:20px; padding:15px 17px; margin-bottom:11px; box-shadow:var(--shadow); }
  .entry-date{ font-size:11.5px; font-weight:800; color:var(--ink-soft); }
  .entry-note{ font-size:14px; margin-top:5px; font-weight:600; overflow-wrap:break-word; }
  .entry-tags{ display:flex; gap:6px; flex-wrap:wrap; margin-top:8px; }
  .tag{ font-size:10.5px; font-weight:800; color:var(--purple-deep); background:var(--purple-soft); padding:4px 10px; border-radius:999px; }
  .tag.mint{ color:var(--mint-deep); background:var(--mint-soft); }
  .tag.peach{ color:#C06A2C; background:var(--peach-soft); }

  .chip-row{ display:flex; flex-wrap:wrap; gap:8px; margin-top:8px; }
  .chip{ background:#F5F2FC; border:2px solid transparent; border-radius:999px; padding:8px 14px; font-size:12.5px; font-weight:800; color:var(--ink-soft); }
  .chip.selected{ background:var(--purple-soft); border-color:var(--purple); color:var(--purple-deep); }

  .pattern-bar-row{ display:flex; align-items:center; gap:10px; margin-bottom:11px; }
  .pattern-bar-label{ width:128px; font-size:12.5px; font-weight:800; flex-shrink:0; display:flex; gap:6px; align-items:center; }
  .pattern-bar-track{ flex:1; height:12px; background:#EFEBFA; border-radius:999px; overflow:hidden; }
  .pattern-bar-fill{ height:100%; border-radius:999px; background:#C9C2EC; }
  .pattern-bar-fill.hot{ background:linear-gradient(90deg,var(--peach),var(--purple)); }

  .med-circle{ width:170px; height:170px; border-radius:50%; margin:26px auto;
    background:radial-gradient(circle at 35% 30%, #D8CFFF, var(--purple) 90%);
    transition:transform 4s ease-in-out; display:flex; align-items:center; justify-content:center;
    font-weight:800; font-size:15px; color:#fff; box-shadow:0 14px 34px rgba(122,107,240,.35); }
  .med-step{ font-size:20px; font-weight:700; line-height:1.5; text-align:center; min-height:92px; padding:0 8px; }
  .med-timer{ font-size:13.5px; font-weight:800; color:var(--ink-soft); text-align:center; margin-top:8px; }
  .med-progress{ height:12px; background:#EBE6F7; border-radius:999px; margin-top:22px; overflow:hidden; }
  .med-progress > div{ height:100%; background:linear-gradient(90deg,var(--mint),var(--purple)); transition:width 1s linear; border-radius:999px; }

  .journal-full{ font-size:14px; line-height:1.65; font-weight:600; white-space:pre-wrap; overflow-wrap:break-word; margin-top:8px; }
  .tr-field{ margin-top:10px; }
  .tr-field .k{ font-size:10.5px; font-weight:900; text-transform:uppercase; letter-spacing:.05em; color:var(--ink-soft); }
  .tr-field .v{ font-size:14px; font-weight:600; margin-top:2px; white-space:pre-wrap; overflow-wrap:break-word; }

  input[type=range]{ width:100%; accent-color:var(--purple); height:36px; margin-top:8px; }
  .big-num{ font-size:46px; font-weight:900; text-align:center; color:var(--purple-deep); }
  .storm-dots{ display:flex; gap:6px; justify-content:center; margin:14px 0 4px; }
  .storm-dots span{ width:8px; height:8px; border-radius:50%; background:#E3DEF3; }
  .storm-dots span.on{ background:var(--purple); }

  .empty{ color:var(--ink-soft); font-size:14px; font-weight:700; padding:22px 0; text-align:center; }
  .toast{ position:fixed; bottom:96px; left:50%; transform:translateX(-50%); background:var(--ink); color:#fff; padding:12px 22px; border-radius:999px; font-size:14px; font-weight:800; opacity:0; transition:opacity .25s; pointer-events:none; z-index:30; box-shadow:0 8px 24px rgba(0,0,0,.2); white-space:nowrap; }
  .toast.show{ opacity:1; }

  .confetti{ position:fixed; top:-16px; border-radius:4px; z-index:40; pointer-events:none; animation:fall linear forwards; }
  @keyframes fall{ to{ transform:translateY(110vh) rotate(720deg); opacity:.9; } }
  @keyframes pop{ 0%{transform:scale(.6); opacity:0;} 70%{transform:scale(1.06);} 100%{transform:scale(1); opacity:1;} }
  .pop{ animation:pop .35s ease both; }
  @media (prefers-reduced-motion: reduce){ .med-circle{transition:none;} .confetti{display:none;} .pop{animation:none;} }
</style>
</head>
<body>
<div class="wrap" id="app"></div>
<nav class="tabs" id="tabs" style="display:none;">
  <button data-view="today"><span class="ico">🌱</span>Today</button>
  <button data-view="learn"><span class="ico">📚</span>Learn</button>
  <button data-view="journal"><span class="ico">✍️</span>Journal</button>
  <button data-view="calm"><span class="ico">🧘</span>Calm</button>
  <button data-view="progress"><span class="ico">📈</span>Progress</button>
  <button data-view="more"><span class="ico">⚙️</span>More</button>

<script>
'use strict';
// =====================================================
// CONTENT
// =====================================================
const CONCERNS = [
  {id:'relationship', emoji:'💞', label:'Relationship patterns', sub:'Attachment, people-pleasing, needing reassurance, losing yourself'},
  {id:'stress', emoji:'🌪️', label:'Stress & overwhelm', sub:'Too much on your plate, hard to switch off'},
  {id:'anxiety', emoji:'💭', label:'Anxious, racing thoughts', sub:'Mind loops on worst-case scenarios'},
  {id:'mood', emoji:'🌧️', label:'Low mood', sub:'Flat, heavy, or hard to find energy'},
  {id:'sleep', emoji:'🌙', label:'Sleep', sub:'Trouble winding down or staying asleep'},
  {id:'focus', emoji:'🎯', label:'Focus & motivation', sub:'Hard to start, hard to stay on task'},
  {id:'selfworth', emoji:'🪴', label:'Self-worth', sub:'Harsh inner critic, feeling not enough'},
];

const LIKERT_A = [
  {id:'attachment', text:'I worry that people I care about will pull away or leave.'},
  {id:'pleasing', text:'I say yes to things I don\'t want to do, to avoid disappointing people.'},
  {id:'validation', text:'My mood rises and falls based on how others respond to me.'},
  {id:'caretaking', text:'I feel responsible for managing other people\'s emotions.'},
];
const LIKERT_B = [
  {id:'voice', text:'I have trouble saying what I actually need or want.'},
  {id:'rumination', text:'I replay conversations, wondering if I said something wrong.'},
  {id:'selfloss', text:'In relationships, I tend to lose track of my own interests and identity.'},
  {id:'conflict', text:'When someone seems upset with me, I can\'t think about anything else until it\'s resolved.'},
];

const PATTERNS = {
  attachment:{ name:'The Anchor-Seeker', short:'Attachment anxiety', emoji:'⚓', tint:'var(--purple-soft)',
    desc:'Closeness feels safest when it\'s constantly confirmed, so the mind scans for signs of distance and treats ambiguity as threat. The good news: "they\'re pulling away" is a prediction, not a fact — and predictions can be tested.'},
  pleasing:{ name:'The Peacekeeper', short:'People-pleasing', emoji:'🕊️', tint:'var(--peach-soft)',
    desc:'Saying yes became a survival skill: keep everyone happy and nothing bad happens. The cost is your own preferences going quiet. We\'ll test the belief "if I disappoint someone, something terrible follows" with small, safe experiments.'},
  validation:{ name:'The Mirror', short:'External validation', emoji:'🪞', tint:'var(--sky-soft)',
    desc:'Your sense of being okay lives in other people\'s reactions — praise lands like oxygen, silence like judgment. We\'ll build an internal source of that same signal, so approval becomes a bonus instead of the fuel.'},
  caretaking:{ name:'The Caretaker', short:'Codependent caretaking', emoji:'🤲', tint:'var(--rose-soft)',
    desc:'Other people\'s feelings feel like your job — if they\'re unhappy, you failed. The work is separating "I care about this person" from "I\'m responsible for this person\'s emotional state." Related, but not the same thing.'},
  voice:{ name:'The Quiet Voice', short:'Unspoken needs', emoji:'🗣️', tint:'var(--mint-soft)',
    desc:'Needs get filtered before they\'re spoken — is this too much, will this cause a problem? — and often never make it out. Unspoken needs don\'t disappear; they turn into resentment or anxiety. Practice naming them small and early.'},
  rumination:{ name:'The Replayer', short:'Rumination', emoji:'🔁', tint:'var(--sun-soft)',
    desc:'The mind reruns conversations hunting for the mistake, as if enough analysis makes things safe. Rumination feels like problem-solving but produces zero new information. The skill is spotting the loop and stepping out — not winning it.'},
  selfloss:{ name:'The Chameleon', short:'Self-loss', emoji:'🦎', tint:'var(--purple-soft)',
    desc:'You adapt so completely to whoever you\'re with that your own edges blur. Identity gets rebuilt behaviorally — by regularly doing things that are yours, whether or not anyone else values them.'},
  conflict:{ name:'The Firewatcher', short:'Conflict sensitivity', emoji:'🔥', tint:'var(--peach-soft)',
    desc:'Someone\'s displeasure hijacks your whole system until it\'s repaired. But the discomfort of an unresolved moment IS tolerable — even when it doesn\'t feel like it — and tolerance grows through practice, not avoidance.'},
};

const DISTORTIONS = [
  {id:'mindreading', label:'Mind reading', sub:'"They didn\'t reply — they must be annoyed with me."'},
  {id:'catastrophizing', label:'Catastrophizing', sub:'"If this goes wrong, everything falls apart."'},
  {id:'allornothing', label:'All-or-nothing', sub:'"If it\'s not perfect, it\'s a failure."'},
  {id:'shoulds', label:'"Should" statements', sub:'"I should always be available. I shouldn\'t need help."'},
  {id:'personalization', label:'Personalization', sub:'"They\'re in a bad mood — probably something I did."'},
  {id:'emotionalreasoning', label:'Emotional reasoning', sub:'"I feel like a burden, so I must be one."'},
];

// Each source has 3 LEVELS of practices. You unlock the next level by
// completing practices from that source (5 completions → L2, 12 → L3).
const PRACTICES = {
  attachment:[
    {title:'The anchor statement', min:3, type:'do', body:'When the pull to seek reassurance hits, pause and tell yourself: "Nothing has actually changed in the last hour. This is the alarm, not the facts." Wait 20 minutes before acting on the urge.'},
    {title:'Ambiguity log', min:5, type:'journal', body:'Take one ambiguous moment from today (short reply, flat tone). Write two explanations besides "something is wrong between us." You don\'t have to believe them — just prove they exist.'},
    {title:'Prediction test', min:6, type:'journal', body:'Level 3: write down the fear as a testable prediction ("if I don\'t text first, they won\'t reach out"). Then run the test and record the actual result. Build a file of predictions vs. reality.'},
  ],
  pleasing:[
    {title:'The delayed yes', min:2, type:'do', body:'When someone asks something of you today, don\'t answer right away — say "let me check and get back to you." The goal isn\'t no; it\'s breaking the reflex so the choice is yours again.'},
    {title:'One honest no', min:5, type:'do', body:'Level 2: decline one low-stakes thing this week — an optional meeting, a favor you don\'t have room for. Notice the discomfort, then notice what actually happens after. That gap is the data.'},
    {title:'The no with no cushion', min:5, type:'do', body:'Level 3: say no to something without over-explaining, apologizing twice, or offering three alternatives. One clean sentence. The relationship will hold — watch it hold.'},
  ],
  validation:[
    {title:'Self-validation rep', min:3, type:'journal', body:'Write one thing you did well today — before anyone else has weighed in. Be specific about why it was good. You\'re training the internal judge to speak first.'},
    {title:'The unposted win', min:2, type:'do', body:'Level 2: do or notice something good today and deliberately tell no one. Let it belong entirely to you. Uncomfortable at first — that\'s the muscle working.'},
    {title:'Praise fast', min:3, type:'do', body:'Level 3: for one full day, when praise comes, just say "thanks" — no deflecting, no immediately seeking more. Notice the urge to fish or dismiss, and let it pass.'},
  ],
  caretaking:[
    {title:'Whose problem is it?', min:4, type:'journal', body:'Pick one thing weighing on you about someone else. Whose problem is it, actually? Write one sentence for your part and one for theirs. You can care about their part without carrying it.'},
    {title:'An hour that\'s yours', min:60, type:'do', body:'Level 2: block one hour this week for something purely yours — no usefulness to anyone else required. Protect it like a meeting.'},
    {title:'Don\'t fix, just hear', min:5, type:'do', body:'Level 3: next time someone you love vents, don\'t fix, manage, or absorb it. Just listen and reflect back. Their feeling gets to exist without becoming your assignment.'},
  ],
  voice:[
    {title:'Name one need, small', min:3, type:'do', body:'Say one small preference out loud today that you\'d normally swallow — where to eat, needing 20 minutes to decompress. Small and early beats big and late.'},
    {title:'The unsent sentence', min:5, type:'journal', body:'Level 2: write the sentence you wish you could say to someone, exactly as you\'d say it with zero consequences. You don\'t have to send it. Naming it precisely is the rep.'},
    {title:'Send a real one', min:5, type:'do', body:'Level 3: take one need you\'ve been sitting on and actually voice it to the person — calmly, directly, without pre-apologizing. Then log what actually happened vs. what you feared.'},
  ],
  rumination:[
    {title:'Name the loop', min:1, type:'do', body:'When you catch yourself replaying a conversation, literally name it: "replaying again." Ask: has this loop produced any new information? Then return to what\'s in front of you.'},
    {title:'Thought record', min:8, type:'journal', body:'Level 2: run the looping thought through a full thought record in the Journal tab — situation, automatic thought, evidence both ways, balanced take. Loops hate paper.'},
    {title:'The worry appointment', min:10, type:'do', body:'Level 3: schedule 10 minutes of deliberate worry time. When rumination shows up outside that window, tell it: "you have an appointment at 7." It sounds silly. It works.'},
  ],
  selfloss:[
    {title:'The yours list', min:5, type:'journal', body:'Write three things that are genuinely yours — interests, opinions, tastes — that exist independent of anyone\'s approval. Pick one and give it 15 minutes this week.'},
    {title:'Opinion first', min:2, type:'do', body:'Level 2: when someone asks "what do you want to do?" — answer with a real preference before asking theirs. Even if you\'d be fine either way. Especially then.'},
    {title:'The solo project', min:20, type:'do', body:'Level 3: put regular weekly time into something that\'s only yours — a hobby, a skill, a build. Not for anyone\'s benefit or approval. This is identity maintenance, not selfishness.'},

   steps:[

     {h:'Check the personalization trap', b:'The automatic thought is probably "it\'s something I did." What\'s the actual evidence? Hunger, work stress, a bad night\'s sleep, and a hundred other things are all competing explanations — and they\'re usually the right ones.'},

  {id:'flaws', emoji:'🔎', label:'Flaw hyperfocus', sub:'Mentally building a case file of their bad traits',

// =====================================================
// COURSES — the Learn program. One lesson unlocks per day.
// Each lesson optionally links an exercise {src, idx} from PRACTICES.
// =====================================================
const COURSES=[
  {id:'found', emoji:'🧠', title:'How anxiety runs the show', sub:'The foundation — read this first', days:[
    {t:'Your alarm system', ex:null, b:'Deep in your brain is a threat-detection system that predates language, logic, and relationships. Its job is simple: spot danger fast, sound the alarm, ask questions never.\n\nHere\'s the design flaw that matters for everything we\'ll do together: it\'s calibrated for false alarms. A smoke detector that misses one real fire is useless, so evolution built one that goes off for burnt toast. Your anxiety is burnt-toast alarms — real sirens, real racing heart, real dread — triggered by things that are usually not fires.\n\nThe alarm being loud says nothing about the fire being real. That one sentence is the foundation of this entire program. You don\'t have to believe it yet — the next six weeks are about proving it to yourself.'},
    {t:'Thoughts are guesses', ex:{src:'rumination',idx:0}, b:'Your brain is a prediction machine. It doesn\'t perceive reality directly — it makes fast guesses and presents them to you as facts. "She\'s mad at me." "This means the relationship is failing." Those arrive with the full confidence of truth, in your own voice, instantly.\n\nCBT calls these automatic thoughts, and the core skill of this whole program is learning to catch one and ask: is this a fact, or a guess?\n\nA fact is what a camera would record: "She answered in three words." The guess is everything your brain added: "...because she\'s pulling away." Same moment, two very different claims. Today, just practice spotting the difference once. That\'s the rep.'},
    {t:'Your thinking traps', ex:{src:'rumination',idx:1}, b:'Guesses fail in predictable patterns — the traps you flagged in your intake. Mind reading: claiming to know what someone thinks. Catastrophizing: one bad signal becomes a chain reaction ending in disaster. Personalization: their mood must be about you. Emotional reasoning: I feel it, so it\'s true.\n\nHere\'s why naming them matters: an unnamed trap feels like insight. A named trap is just a known bug doing its known thing. "I\'m mind reading again" is a fundamentally different experience than "she\'s definitely upset with me" — same thought, but you\'re holding it instead of it holding you.\n\nThe thought record in your Journal is a trap-detector. Every one you run makes the catching faster.'},
    {t:'Feelings aren\'t facts', ex:null, b:'Anxiety\'s best trick is using the intensity of a feeling as proof of its accuracy. The dread feels enormous, so the danger must be enormous. But feelings are alarm output, not evidence input — they tell you the alarm fired, nothing more.\n\nYou\'ve lived this: a moment of total certainty that something was wrong, that dissolved by the next morning. The feeling was 100% real. The fact it pointed to didn\'t exist. Both things are true, and holding both at once is the skill.\n\nThe move: when a feeling is huge, name it and its size — "anxiety, about an 80" — without accepting its story. You can honor the alarm without obeying it. That\'s not suppression. That\'s telling the difference between weather and news.'},
    {t:'Why it never gets better on its own', ex:null, b:'Here\'s the cruel mechanics: everything you do to relieve anxiety in the moment teaches the alarm it was right.\n\nSeek reassurance → relief → brain logs "that was a real threat, reassurance saved us." Avoid the conversation → relief → "good thing we avoided that danger." Every escape confirms the alarm\'s judgment and buys you a louder alarm tomorrow. This is the anxiety maintenance cycle, and it\'s why patterns run for years without a single fire ever being real.\n\nThe way out is backwards of every instinct: stay in the discomfort a little longer than feels safe, and let the alarm discover — by itself, from direct evidence — that nothing burned. That\'s what your practices actually are: controlled evidence-gathering. Each one is small on purpose.'},
    {t:'How change actually happens', ex:null, b:'Insight doesn\'t change patterns. If understanding the problem were enough, you\'d be done — you probably understood most of this before day one. Patterns live in the fast, wordless part of the brain, and that part doesn\'t read. It only learns from repetitions of lived experience.\n\nThat\'s why this program is built on tiny daily reps instead of big realizations. Every "delayed yes," every 20-minute wait before a reassurance text, every survived storm is one rep. Individually they feel too small to matter. That\'s correct — and irrelevant. Nobody gets strong from one workout.\n\nThe levels in this app aren\'t decoration: they track actual reps, because reps are the only currency your alarm system accepts. Trust the boring math.'},
    {t:'The long game', ex:null, b:'A few honest expectations before the pattern courses begin.\n\nProgress won\'t be linear. You\'ll have a great week, then a storm that feels like day one. That\'s not relapse — recovery is measured in how fast you come back to baseline, not in never spiking. Watch your recovery time shrink; that\'s the real progress bar.\n\nThe patterns won\'t vanish. The Anchor-Seeker, the Peacekeeper — they\'re grooves worn over decades. The goal isn\'t erasing them; it\'s that they become quieter suggestions instead of commands. You\'ll hear the thought and choose.\n\nAnd one more: this work makes you a better partner, but it\'s for YOU. A calmer alarm system is yours to keep, in every relationship and every room, for the rest of your life. Tomorrow: your first pattern course.'},
  ]},
  {id:'attachment', emoji:'⚓', title:'The Anchor-Seeker', sub:'Attachment anxiety — the alarm behind needing to know', days:[
    {t:'Where the alarm comes from', ex:{src:'attachment',idx:0}, b:'Attachment isn\'t a personality quirk — it\'s a survival system. Human infants die without a caregiver, so evolution installed a monitoring system that tracks proximity to the people we depend on and panics when the connection feels threatened.\n\nIn some of us, that system runs hot. Usually because somewhere along the way, connection felt unpredictable — and a system that can\'t predict starts over-monitoring. Checking becomes constant. Ambiguity becomes threat.\n\nThe key reframe: your sensitivity isn\'t brokenness, it\'s calibration. A system tuned by unpredictability, doing exactly what it was tuned to do. And calibration can be re-tuned — that\'s this course. Today\'s rep is the anchor statement: the first tool for answering the alarm without obeying it.'},
    {t:'The reassurance trap', ex:{src:'attachment',idx:0}, b:'When the alarm fires — she seems distant, the text sits unanswered — reassurance feels like the obvious medicine. Ask, check, confirm, relief. Problem solved?\n\nRun the tape forward. The relief lasts hours, sometimes minutes. Then the alarm needs another dose. Over months, the doses get bigger: more checking, more confirmation-seeking, and — the part that stings — more strain on the very connection you\'re protecting, because no one can be someone\'s anti-anxiety medication indefinitely.\n\nReassurance isn\'t evil; couples reassure each other constantly. The trap is *compulsive* reassurance — seeking it to kill an alarm rather than to connect. The test: "am I asking because I want her, or because I need the feeling to stop?" Different questions, different answers.'},
    {t:'Learning to sit in not-knowing', ex:{src:'attachment',idx:1}, b:'The Anchor-Seeker\'s real enemy isn\'t distance — it\'s ambiguity. A clear "I\'m upset with you" is almost easier than a quiet evening you can\'t read. The alarm fills every information gap with the worst available story.\n\nHere\'s the skill that changes everything: ambiguity tolerance. Not knowing what her quietness means — and letting that be okay for an hour. Not because the answer doesn\'t matter, but because most ambiguity resolves itself without your intervention, and your guesses while waiting are reliably worse than reality.\n\nToday\'s rep, the ambiguity log, builds this directly: take one unreadable moment and generate two boring explanations. You\'re not choosing to believe them. You\'re proving the worst story isn\'t the only story.'},
    {t:'Secure is a set of behaviors', ex:{src:'attachment',idx:1}, b:'Here\'s the most hopeful finding in attachment research: security isn\'t a type you\'re born into. It\'s a set of behaviors — and behaviors can be practiced by anyone, including you, starting from wherever your wiring currently is.\n\nWhat do secure people actually DO? They ask directly instead of testing. They let a partner\'s bad mood be the partner\'s mood. They tolerate an unresolved evening. They interpret ambiguity neutrally by default. None of that requires feeling secure first — the feeling follows the behavior, not the other way around.\n\nThis is why "fake it till you make it" is half right. You\'re not faking anything — you\'re doing secure reps with an anxious alarm blaring, which is harder and counts more. The alarm quiets when the behavior proves it wrong repeatedly.'},
    {t:'Your anchor protocol', ex:{src:'attachment',idx:2}, b:'Last day — let\'s assemble the pieces into a protocol you can run when the alarm hits.\n\nStep one: name it. "Attachment alarm, firing." Naming moves it from being your reality to being an event in your reality.\n\nStep two: fact vs. guess. What did the camera record? What did my brain add?\n\nStep three: delay the urge. Twenty minutes minimum before any checking, texting, or reassurance-seeking. The urge peaks and falls — outlasting it once is worth ten insights.\n\nStep four: return to your lane. Something of yours, for thirty minutes.\n\nStep five: if it still matters after the wave — ask directly, once, like a secure person would. Today\'s rep graduates you to prediction testing: writing the fear down and letting reality grade it. Keep the receipts. They\'re your re-calibration.'},
  ]},
  {id:'pleasing', emoji:'🕊️', title:'The Peacekeeper', sub:'People-pleasing — the yes that costs you', days:[
    {t:'Where the yes-reflex came from', ex:{src:'pleasing',idx:0}, b:'Nobody chooses people-pleasing. It gets installed — usually early, in an environment where someone\'s displeasure was expensive. Maybe conflict felt dangerous, maybe love felt conditional on being easy. The lesson landed deep: keep everyone happy, stay safe.\n\nAnd here\'s the thing — it worked. The yes-reflex is a genuinely effective childhood survival strategy. The problem is it never got uninstalled, so an adult with resources, options, and standing is still running defense software written by a kid.\n\nRespect the pattern for what it did, then notice what it costs now: your preferences go unheard so long you stop hearing them yourself. Today\'s rep — the delayed yes — doesn\'t ask you to say no. It just reopens the gap between request and answer where a choice can live.'},
    {t:'The invisible ledger', ex:{src:'pleasing',idx:0}, b:'Every swallowed no gets recorded. You may not feel it in the moment — the yes is automatic, painless, gone. But somewhere a ledger updates: another thing done that you didn\'t want to do, another preference overridden, another small self-betrayal.\n\nThe ledger doesn\'t stay quiet. It converts to resentment — usually at the people you please most, which is why peacekeepers snap at the ones they love and then feel like monsters. The anger was never missing. It was accruing.\n\nHere\'s the reframe that changes the moral math: saying no isn\'t selfish — it\'s honest accounting. A no spoken today prevents a resentment that would\'ve poisoned tomorrow. The people who love you would take the no over the invisible ledger every single time. Ask them.'},
    {t:'Disappointing people is survivable', ex:{src:'pleasing',idx:1}, b:'Under the yes-reflex lives one specific prediction: "if I disappoint them, something terrible happens." Connection lost, anger unleashed, standing destroyed. The belief is so old it\'s never been tested — the reflex made sure of that.\n\nSo test it. That\'s today\'s rep: one honest no, low stakes, this week. And then — this is the important part — watch what actually happens. Not what the dread predicted. What happens.\n\nWhat happens, almost always: mild surprise, an "okay, no problem," and the world continuing to spin. Occasionally someone\'s briefly annoyed — and then they get over it, because healthy adults survive being told no constantly. Every tested no is a data point against a belief that\'s been running unopposed for decades. Collect them deliberately.'},
    {t:'Needs are not demands', ex:{src:'voice',idx:0}, b:'Peacekeepers collapse two very different things: having a need and imposing a demand. The collapse makes every preference feel like an act of aggression — so the safest move is having no preferences at all.\n\nBut watch the actual difference. A demand: "we\'re eating there, end of discussion." A need: "I\'d really like Thai tonight — what do you think?" One removes the other person\'s choice; one adds information to a shared decision. Stating a preference is a gift to the people deciding with you — it\'s the raw material of an actual relationship between two real people.\n\nKatherine can\'t meet needs she\'s never heard. Today\'s rep: name one small preference out loud that you\'d normally swallow. Not a confrontation. Information.'},
    {t:'The honest yes', ex:{src:'pleasing',idx:2}, b:'Endgame isn\'t becoming a no-machine. It\'s this: making your yes mean something.\n\nRight now, your yes is inflated currency — it\'s the answer to everything, so it carries no information. When you\'ve built a working no, something changes: every yes becomes a real choice, freely made. People can trust it. YOU can trust it. Generosity from choice feels completely different from compliance from fear — to both sides.\n\nThe test for every future request: "if I imagine saying no and the discomfort of that, and I imagine saying yes and the cost of that — which do I actually choose?" Sometimes yes wins honestly! You genuinely like helping. The point was never to help less. It was for helping to be a decision. Today\'s rep is the clean no — one sentence, no cushions. You\'ve earned it.'},
  ]},
  {id:'validation', emoji:'🪞', title:'The Mirror', sub:'External validation — borrowing your worth', days:[
    {t:'The borrowed thermostat', ex:{src:'validation',idx:0}, b:'Everyone\'s mood responds to feedback — that\'s human. The Mirror pattern is something more specific: your sense of being okay is *outsourced*. The thermostat that should sit inside you is installed in other people, and your internal temperature swings with their every reading.\n\nPraise lands like oxygen. Silence reads as judgment. A flat "nice work" gets analyzed for what it really meant. You\'re not vain — you\'re running on external power, and external power is unreliable by nature.\n\nThe goal of this course is not to stop caring what people think — that\'s neither possible nor desirable. It\'s to build an internal power source so external readings become interesting information instead of life support. Today\'s rep starts construction: judge one thing you did today before anyone else gets a vote.'},
    {t:'Why the praise never fills you', ex:{src:'validation',idx:0}, b:'Notice something strange about validation: it doesn\'t accumulate. The compliment from yesterday buys nothing today. Praise pours into the tank and the tank reads empty by morning. Why?\n\nBecause external validation answers the wrong question. The doubt is "am I enough?" — an internal question — and other people\'s opinions can only ever answer "do they currently approve?" Those feel similar and are not the same, which is why no quantity of approval settles the doubt. You can\'t import an answer to an internal question.\n\nThis explains the treadmill: chase, receive, feel relief, feel empty, chase. The exit isn\'t better external answers — it\'s starting to answer internally. Slow, unglamorous, and it actually accumulates. Same rep as yesterday, on purpose: reps are how the internal judge finds its voice.'},
    {t:'Training the internal judge', ex:{src:'validation',idx:1}, b:'You already have an internal judge — the problem is it only knows one verdict. It\'s fluent in criticism and mute on credit. Decades of practice going one direction.\n\nSo train the other direction, mechanically. When you finish something — an estimate, a hard conversation, a workout — the practice is: state your own verdict FIRST, specifically, before checking anyone\'s reaction. "That takeoff was thorough; I caught the framing issue early." Specific matters: "I did fine" is noise, detail is training data.\n\nIt will feel arrogant. That feeling is just unfamiliarity — you\'re not claiming to be flawless, you\'re claiming the right to assess your own work, which every competent adult has. Today\'s rep is the unposted win: something good that no one else ever gets to rate. It belongs entirely to you. Sit in that.'},
    {t:'Silence is not a verdict', ex:{src:'attachment',idx:1}, b:'The Mirror\'s worst enemy isn\'t criticism — it\'s no signal at all. The unanswered message. The meeting where your idea got no reaction. The partner who didn\'t comment. Into every silence, the pattern writes a negative review and signs someone else\'s name.\n\nHere\'s the statistical truth: silence is overwhelmingly about the other person\'s bandwidth, not your worth. People are busy, distracted, hungry, managing their own alarms. The percentage of silences that are secret judgments of you is vanishingly small — but the pattern scores every single one as one.\n\nThe rep: catch one silence-interpretation this week and run the ambiguity drill on it. Two other explanations, minimum. You\'ll notice the alternatives are almost always more plausible than the verdict you auto-wrote. That noticing, repeated, is the repair.'},
    {t:'Self-trust compounds', ex:{src:'validation',idx:2}, b:'Last day. Here\'s what you\'re actually building, named precisely: self-trust. Not confidence (a feeling that comes and goes) — trust, a track record. And track records compound.\n\nEvery time you assess your own work before outsourcing the verdict, deposit. Every unposted win, deposit. Every time praise arrives and you just say "thanks" — receiving it without fishing for more or deflecting it — deposit. That\'s today\'s rep, and it\'s harder than it sounds.\n\nThe compounding effect: after enough deposits, other people\'s reactions change character. Praise becomes pleasant instead of necessary. Criticism becomes evaluable instead of devastating — sometimes they\'re right, sometimes not, and YOU get to weigh it. Silence becomes... silence. That\'s the endpoint: opinions become inputs to your judgment instead of replacements for it.'},
  ]},
  {id:'caretaking', emoji:'🤲', title:'The Caretaker', sub:'Codependent caretaking — carrying what isn\'t yours', days:[
    {t:'Fused feelings', ex:{src:'caretaking',idx:0}, b:'Here\'s the Caretaker\'s core experience: when someone you love is unhappy, you don\'t just notice it — you catch it. Their storm becomes your weather. Their bad day sits in your chest. Emotional fusion: the boundary where your feelings end and theirs begin has gone soft.\n\nFusion masquerades as empathy, but they\'re different machines. Empathy: "I see you\'re hurting, and I care." Fusion: "you\'re hurting, so now I\'m hurting, and I can\'t be okay until you\'re okay." Notice the hostage situation in the second one — your wellbeing is now chained to something you don\'t control.\n\nToday\'s rep — whose problem is it? — is boundary re-drawing on paper: your part in one sentence, their part in one sentence. Caring about their part without carrying it. That line, drawn daily, hardens back into a real boundary.'},
    {t:'Helping vs. absorbing', ex:{src:'caretaking',idx:0}, b:'Caretakers hear "stop carrying their emotions" as "stop caring" — and refuse, correctly, because caring is who you are. So let\'s draw the real line, because it isn\'t between caring and not caring. It\'s between helping and absorbing.\n\nHelping: listening, making soup, giving space, solving a problem when asked. It flows outward and leaves you intact. Absorbing: taking their emotional state into your body, managing your own anxiety by trying to manage their mood, needing them fixed so YOU can breathe. It flows inward and consumes you.\n\nThe tell: after the interaction, are you drained or just tired? Helping tires; absorbing drains. And here\'s the kicker — absorbing doesn\'t even help them. Nobody\'s ever been cheered up by watching their bad day ruin someone else\'s. Same rep as yesterday: keep drawing the line.'},
    {t:'The guilt is a withdrawal symptom', ex:{src:'caretaking',idx:1}, b:'Try not fixing someone\'s bad mood — just once — and watch what floods in: guilt. "I\'m being cold. A good partner would do something. What\'s wrong with me?" That guilt feels like your conscience speaking. It isn\'t.\n\nIt\'s a withdrawal symptom. You\'re breaking a compulsion, and the compulsion is protesting in the most convincing voice it has. The guilt isn\'t evidence you\'re doing wrong — it\'s evidence the pattern is being challenged. Real conscience-guilt follows actual harm; this guilt follows the *absence of over-functioning*, which harms no one.\n\nSit with it like any craving: name it ("withdrawal guilt"), let it peak, watch it fall. It always falls. Today\'s rep — an hour that\'s yours — will trigger exactly this guilt. That\'s not a bug in the exercise. It\'s the exercise.'},
    {t:'Let them have their feelings', ex:{src:'caretaking',idx:2}, b:'Here\'s a reframe that sounds cold and is actually the deepest respect: other people are entitled to their bad days. Katherine\'s frustration, her stress, her off moods — those are hers. Part of her full human experience. When you rush in to fix, manage, or absorb every one, the hidden message is "your feelings are an emergency I must handle" — which treats her like a problem, not a person.\n\nStrong partners can sit next to each other\'s weather. "That sounds really hard" — full stop, no fixing — is often the most loving sentence available. It says: I trust you to feel this and come through it. I\'m here, not hovering.\n\nToday\'s rep is exactly this: don\'t fix, just hear. One conversation where you listen, reflect back, and deliberately do not solve or absorb. Watch what it does — for both of you.'},
    {t:'Caring with boundaries is bigger caring', ex:{src:'selfloss',idx:2}, b:'Final day — the integration. The Caretaker\'s fear about this whole course: "if I stop carrying, I\'m loving less." Run the actual math.\n\nCarrying-love is finite. It burns your reserves managing weather you don\'t control, breeds hidden resentment, and delivers care with an invisible invoice attached. Everyone can feel the invoice, even when no one names it.\n\nBounded love is renewable. When you\'re not absorbing, you have more to actually give — better listening, realer presence, generosity that costs nothing to receive because it wants nothing back. And you become steadier: someone whose okay-ness doesn\'t wobble with the household mood is an anchor, not a mirror.\n\nToday\'s rep — the solo project — maintains the separate self that makes all of this possible. Keeping something that\'s yours isn\'t stealing from the relationship. It\'s what keeps you fully in it.'},
  ]},
  {id:'voice', emoji:'🗣️', title:'The Quiet Voice', sub:'Unspoken needs — the filter between you and being known', days:[
    {t:'The filter', ex:{src:'voice',idx:0}, b:'Between your needs and your mouth sits a filter, and it\'s ruthless. "Is this too much? Will this cause a problem? Is this worth bothering someone about?" Most needs never survive the review. They get downgraded to "not a big deal" and swallowed.\n\nThe filter was installed for a reason — somewhere, expressing needs got expensive, so the system learned pre-emptive silence. Cheaper to not ask than to ask and cause a ripple.\n\nBut clock the actual price: needs don\'t evaporate when swallowed. They ferment. Into resentment, into anxiety, into the exhausting experience of being chronically un-known by people who would happily know you. Today\'s rep is deliberately tiny: one small preference, out loud. The filter will scream it\'s not worth mentioning. Mention it anyway. We\'re retraining the filter, not winning an argument.'},
    {t:'The cost of unsaid things', ex:{src:'voice',idx:1}, b:'Every unspoken need creates two problems where there were none.\n\nFirst: the need stays unmet — obviously. Katherine can\'t respond to information she never received. The quiet voice runs an impossible experiment: hoping to be understood without being known.\n\nSecond, sneakier: the unsaid thing warps the connection. You start keeping score of sacrifices nobody knew you were making. Small resentments accrue against a person who was never given a chance to do better. From her side, there\'s just... a distance she can\'t name, decisions she made blind, a partner who seems fine and somehow isn\'t.\n\nToday\'s rep — the unsent sentence — is the diagnostic: write what you actually wish you could say, precisely, consequence-free. Just naming it accurately, to yourself, is the first honest data this pattern has produced in years.'},
    {t:'Small and early beats big and late', ex:{src:'voice',idx:0}, b:'Here\'s the pattern\'s cruelest mechanic: swallowed needs don\'t stay small. The unsaid "I need twenty minutes to decompress" compounds daily until it erupts as a fight about nothing three weeks later — oversized, off-target, and confusing to everyone including you. The quiet voice doesn\'t avoid conflict. It defers and enlarges it.\n\nThe alternative is a maintenance schedule: small and early. Needs voiced at size small are easy to say, easy to hear, easy to meet. "Can we do Thai instead?" costs nothing. The same preference, suppressed for a month and detonating as "you never ask what I want" — that costs plenty.\n\nSame rep as day one, on purpose: one small preference, out loud, today. You\'re not practicing a sentence. You\'re practicing a maintenance schedule.'},
    {t:'Needs are information, not burden', ex:{src:'voice',idx:1}, b:'The filter\'s core belief: my needs are a load I\'d be placing on someone. Every ask is an imposition; the loving move is needing nothing. Flip the camera and look from Katherine\'s side.\n\nA partner who never states needs isn\'t a gift — he\'s a puzzle with no edge pieces. She\'s left guessing, and when guesses miss, there\'s disappointment she can sense but was never equipped to prevent. That\'s the actual burden: navigating a relationship on zero information.\n\nStated needs are a map. "This matters to me." "I struggle when the plan changes last-minute." "I need a slow morning on Saturdays." Every one makes you easier to love well, not harder. Think about how it feels when SHE tells you exactly what she needs — like relief, like being trusted with the real her. That\'s what you\'re withholding. The unsent sentence rep continues today — and consider whether one of them is ready to send.'},
    {t:'Being known vs. being liked', ex:{src:'voice',idx:2}, b:'Last day, deepest layer. The quiet voice runs on a trade you never consciously agreed to: trading being known for being liked. Stay easy, stay low-maintenance, stay approved-of — and stay fundamentally unmet, because the person being approved of is an edited release.\n\nHere\'s the loneliness of it: approval of the edited version never lands. Some part of you always knows they like the filter, not the face. The only connection that actually nourishes is with the unedited person — needs, preferences, no\'s and all. Which means the filter, built to protect connection, is the thing standing in front of it.\n\nToday\'s graduation rep: send a real one. Take a need you\'ve been sitting on and voice it to the actual person — calm, direct, no pre-apology. Then log what happened versus what the filter predicted. Start letting yourself be known. It\'s the only version of liked that counts.'},
  ]},
  {id:'rumination', emoji:'🔁', title:'The Replayer', sub:'Rumination — the loop that feels like thinking', days:[
    {t:'Why the loop feels productive', ex:{src:'rumination',idx:0}, b:'Rumination has perfect camouflage: it feels exactly like problem-solving. You\'re "processing." You\'re "figuring out what went wrong." Replaying that conversation for the ninth time feels like diligence — like the responsible thing.\n\nSo apply the engineer\'s test: what does the process output? Real problem-solving converges — each pass produces new information, options narrow, a decision emerges. Rumination loops — the ninth replay contains exactly what the second one did, plus more dread. No new inputs, no new outputs, running hot. Any system doing that isn\'t computing. It\'s stuck.\n\nThat\'s the whole diagnostic, and it\'s today\'s rep: when you catch a replay, ask one question — "has this produced any new information?" If no, name it: "looping." You can\'t always stop the loop yet. Naming it is enough for now.'},
    {t:'What the loop is actually for', ex:{src:'rumination',idx:1}, b:'If the loop produces nothing, why does the brain keep running it? Because its real job isn\'t solving — it\'s a safety behavior. The loop whispers: if I keep analyzing this, I can\'t be blindsided by it. Replaying the conversation feels like standing guard over the threat.\n\nIt\'s the mental version of checking the locked door twelve times. The checking doesn\'t make the door more locked — it makes the fear of unlocked doors stronger, because every check tells your alarm "this is worth checking." Rumination maintains the exact anxiety it pretends to manage.\n\nWhich reveals the exit: the loop isn\'t defeated by finishing it (it has no finish line) but by demonstrating you can be safe WITHOUT it. Today\'s rep is the thought record — the loop\'s natural predator, because paper forces the convergence the loop avoids. Evidence in, verdict out, case closed.'},
    {t:'Postponement actually works', ex:{src:'rumination',idx:2}, b:'You can\'t suppress a thought — "don\'t think about the conversation" IS thinking about the conversation. But here\'s what the research consistently shows works: you can schedule it.\n\nIt sounds absurd. It isn\'t. When the replay starts at 10am, you tell it: "you have an appointment at 7pm. Ten full minutes, my complete attention." The brain, weirdly, accepts this deal — because postponement isn\'t suppression. You\'re not saying the worry doesn\'t matter; you\'re saying it has a slot.\n\nTwo things happen. Most days, 7pm arrives and the urgent 10am catastrophe has deflated so completely you struggle to care — proof it was alarm, not information. And your brain slowly learns that worries can WAIT, which breaks their emergency status entirely. That\'s today\'s rep: the worry appointment. Run it exactly as written. Let it be silly. Let it work.'},
    {t:'Paper beats brain', ex:{src:'rumination',idx:1}, b:'Why does writing dismantle a loop that thinking can\'t touch? Mechanics, not magic.\n\nIn your head, the thought is a fog — everywhere, edgeless, seemingly enormous. Working memory can only hold a few pieces at once, so the loop re-presents the same fragments endlessly and they feel fresh each lap. On paper, the fog condenses into sentences. Sentences have edges. Edges can be examined. "She\'s probably done with me" mid-spiral at 11pm feels like a verdict; written down, it visibly becomes what it is — a guess, produced by a tired brain, unsupported by the evidence column sitting right next to it.\n\nWriting also gives loops the one thing they lack: an ending. A record concludes. A verdict gets rendered. The file closes. Today\'s rep: full thought record on whatever\'s currently circling. Give the loop an ending on paper, since it will never supply its own.'},
    {t:'Closing open loops before bed', ex:{src:'rumination',idx:2}, b:'Final day — the nighttime protocol, because 11pm is the Replayer\'s home stadium. Dark, quiet, defenseless: perfect looping conditions. The brain rehearses what it\'s afraid to forget, and at night it\'s afraid to forget everything.\n\nSo give it what it actually wants: external storage. The pre-sleep download — every open loop onto paper, one next-step each. "Follow up on the estimate → email Rob at 8." "Weird moment with Katherine → ask about it tomorrow at dinner, not now." The brain releases what it trusts is captured. This is why the technique works when willpower doesn\'t: you\'re not fighting the rehearsal instinct, you\'re satisfying it.\n\nCourse summary, five tools: name the loop, run the no-new-information test, schedule the worry, put it on paper, download before bed. The Replayer never fully retires — but you now hold every exit. Use them until they\'re reflexes.'},
  ]},
  {id:'selfloss', emoji:'🦎', title:'The Chameleon', sub:'Self-loss — finding your edges again', days:[
    {t:'How the merging happens', ex:{src:'selfloss',idx:0}, b:'Nobody wakes up merged. It happens by a thousand tiny, loving-looking moves: their music becomes your music, their opinion becomes the default, "whatever you want" becomes your entire personality in the relationship. Each individual adaptation is small, generous, harmless. The sum is a self with no edges.\n\nThe tell isn\'t dramatic — it\'s a strange blankness when someone asks what YOU want. You reach for a preference and find the shelf empty. Not because you have no self, but because the self stopped getting exercise. Preferences are muscles; unused, they atrophy quietly.\n\nThe repair is behavioral, not philosophical. You don\'t find yourself by thinking about who you are — you rebuild by doing things that are yours. Today\'s rep: the yours list. Three things that are genuinely, specifically yours. The shelf isn\'t empty. It\'s dusty. Start there.'},
    {t:'Preferences are muscles', ex:{src:'selfloss',idx:1}, b:'"I don\'t care, you pick" feels like generosity. Sometimes it is. As a lifestyle, it\'s a muscle wasting program.\n\nHere\'s the mechanism: every deferred choice skips a rep. Skip enough reps and the preference-generating machinery genuinely weakens — you stop knowing what you want because the knowing-what-you-want system hasn\'t run in months. Then not-knowing makes deferring easier, which weakens it further. The Chameleon\'s spiral.\n\nThe rehab program is embarrassingly simple: answer preference questions with actual preferences. "Where should we eat?" — pick a place. Wrong answers don\'t exist; stated answers are the entire win. It will feel arbitrary at first, like guessing. That\'s the atrophied muscle wobbling. Today\'s rep is exactly this — opinion first. When asked what you want to do, answer with a real preference before asking hers. Especially when you\'d be fine either way.'},
    {t:'The identity portfolio', ex:{src:'selfloss',idx:2}, b:'Think of identity like you think about money: diversification. When everything you are is invested in one holding — the relationship — every fluctuation in that holding is a personal earthquake. A rough week between you two isn\'t just a rough week; it\'s your entire portfolio crashing, which is why small conflicts can feel existential.\n\nA diversified self holds positions the relationship can\'t touch: skills, projects, friendships, competencies, a body of work. When the relationship wobbles — all relationships wobble — the diversified self stays solvent. And that stability flows backward INTO the relationship: partners who are whole people bring more to the table and cling less to it.\n\nToday\'s rep — the solo project — is a deliberate investment in the non-relationship portfolio. Weekly time, only yours, compounding.'},
    {t:'Alone is not distance', ex:{src:'caretaking',idx:1}, b:'The Chameleon\'s hidden equation: separate = distant. Time apart feels like a small betrayal; wanting your own thing registers as pulling away from her. So togetherness becomes compulsory, and compulsory togetherness slowly suffocates the thing it\'s trying to protect.\n\nRun the equation backwards. What does constant merging actually produce? Two people with nothing new to bring each other — no separate experiences to share, no missing each other, no fresh air in the system. The relationships that stay alive breathe: together, apart, together, with something to say.\n\nAnd notice: her separate time is good for you too. Her own hobbies, her own friends, her own hours — that\'s her staying a whole person, which is who you fell for. Today\'s rep: an hour that\'s yours, taken without guilt-servicing. Separateness in service of the connection. The equation was wrong.'},
    {t:'The interesting-person dividend', ex:{src:'voice',idx:2}, b:'Last day — the payoff nobody mentions. All this edge-finding, preference-stating, portfolio-building? It compounds into something specific: you become more interesting to be with. Including to Katherine. Especially to Katherine.\n\nThink about who\'s magnetic in any room: people with their own takes, their own projects, their own gravity. A partner who dissolved into agreement offers nothing to bump into — no friction, no discovery, no news. The Chameleon\'s tragedy is sacrificing the very substance that made him worth choosing.\n\nEvery yours-list item, every stated opinion, every solo project hour is you re-becoming someone with edges — someone she gets to keep discovering. Today\'s graduation rep: voice one real thing — a want, a take, a no — directly to her. Not to win space. To be met. Edges are where two people actually touch.'},
  ]},
  {id:'conflict', emoji:'🔥', title:'The Firewatcher', sub:'Conflict sensitivity — surviving the unresolved', days:[
    {t:'Why conflict feels like danger', ex:{src:'conflict',idx:0}, b:'When someone\'s upset with you, your body responds like there\'s a predator in the room: heart rate up, gut clenched, thinking narrowed to one channel — fix this NOW. That\'s not weakness. For a social species, exclusion from the group once meant death, so disapproval got wired straight into the survival system. Someone\'s displeasure literally trips ancient alarms.\n\nAdd a personal history where conflict was loud, scary, or ended badly, and the wiring runs hotter: modern disagreement, prehistoric response.\n\nThe first repair is simply accurate labeling. Discomfort is not danger. A tense evening with Katherine is uncomfortable — genuinely, physically — and completely survivable. Your body will insist otherwise; it\'s reading from an old script. Today\'s rep, the repair-urge log, starts separating the alarm\'s predictions from the actual stakes.'},
    {t:'The window of tolerance', ex:{src:'conflict',idx:1}, b:'Everyone has a window of tolerance for conflict-discomfort — the amount they can hold while still thinking clearly. The Firewatcher\'s window is narrow: friction hits, the system floods, and everything becomes about making the feeling stop rather than addressing the actual issue.\n\nHere\'s what matters: windows widen with use. Every time you stay in manageable discomfort a bit longer than instinct wants — without fleeing, fixing, or capitulating — the window stretches. This is the same principle as every exposure-based method in psychology, and it\'s the most reliably effective tool the field has.\n\nToday\'s rep is a direct window workout: sit in the unresolved. Ten minutes of friction left deliberately un-smoothed. Watch the discomfort arc — spike, plateau, decline. It ALWAYS declines. Your alarm has just never been allowed to stay long enough to learn that.'},
    {t:'Rupture and repair', ex:{src:'conflict',idx:0}, b:'Here\'s the research finding that should change how you see every disagreement: stable, happy couples don\'t fight less. They repair better. The famous relationship studies found conflict frequency barely predicts anything — repair quality predicts nearly everything.\n\nSit with what that means. Rupture is not damage — it\'s a normal, unavoidable feature of two real people sharing a life. The rupture-repair cycle, completed over and over, is literally how trust gets built: every repaired conflict is proof the relationship survives weather. Couples who never fight are often just couples where someone (hello, Peacekeeper) is absorbing everything — and that\'s the fragile configuration, not the strong one.\n\nSo the Firewatcher\'s goal was never zero fires. It\'s trusting the repair. Same rep as day one — log the repair urge, rate the actual catastrophe odds. The odds keep coming back small. Notice that.'},
    {t:'Rushed repair isn\'t repair', ex:{src:'conflict',idx:1}, b:'The Firewatcher\'s signature move: the instant, desperate patch job. Apologize for everything, concede every point, smooth every surface — not because the issue got resolved, but because the discomfort had to end. It looks like peacemaking. It\'s actually fire suppression, and it leaves the fuel in place.\n\nWatch what rushed repair skips: the actual disagreement never gets aired, your actual position never gets stated, and the "resolution" is just your capitulation wearing a peace treaty\'s clothes. The issue returns — it has to, nothing was addressed — and now with interest.\n\nReal repair needs the fire to burn down first. Regulated bodies, some hours or a night, then the actual conversation: what happened for each of you, what\'s needed next time. Today\'s rep is sitting in the unresolved again — because tolerating the gap between rupture and repair IS the skill that makes real repair possible.'},
    {t:'Staying in your seat', ex:{src:'conflict',idx:2}, b:'Graduation day. The complete Firewatcher protocol, assembled:\n\nWhen friction hits — body first. Four slow exhales before any words; you cannot think your way down from a flood. Then the label: "uncomfortable, not dangerous." Then the window: let the unresolved exist without patching it; you\'ve now watched the discomfort curve fall on its own multiple times. Then real repair, later, from a regulated body: your actual position, stated plainly, plus genuine curiosity about hers.\n\nAnd the capstone skill, today\'s rep: disagree out loud. Voice one genuine disagreement this week — kindly, plainly — and let it just... stand there. No rushing to reassure, no take-backs, no checking every ten minutes that you\'re still okay. Two people, different views, both fine. Every time you live that sentence, the Firewatcher\'s core terror loses another layer. The fire was never the threat. The fleeing was.'},
  ]},
];

let profile=null, entries=[], journal=[], storms=[], learn=null, settings={reminderTime:'20:00', notifOn:false, medCount:0, tts:false};
let view='today', onboardStep=0;
let stormSession=null;
let learnView={mode:'map', courseId:null, dayIdx:0};
let draft = {concerns:[], likert:{}, distortions:[], coping:null, time:null, goal:''};
let todayDraft = {mood:null, energy:null, note:'', done:new Set()};
let journalMode=null, journalFields={}, journalChips=[];
let expandedJournal=new Set();
let medSession=null;
let lastLevels=null;

const todayStr = ()=>{ const d=new Date(); return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0'); };
const fmtDate = s=>{ const d=new Date(s.slice(0,10)+'T00:00:00'); return d.toLocaleDateString('en-US',{month:'short',day:'numeric'}); };
const esc = s=>String(s||'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
const daysAgo = n=>{ const d=new Date(); d.setDate(d.getDate()-n); return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0'); };

// =====================================================
// STORAGE — window.storage inside Claude, localStorage when hosted
// =====================================================
const store = {
  async get(k){
    if(window.storage && window.storage.get){
      try{ const r=await window.storage.get(k); return r?r.value:null; }catch(e){ return null; }
    }
    try{ return localStorage.getItem('steady:'+k); }catch(e){ return null; }
  },
  async set(k,v){
    if(window.storage && window.storage.set){
      try{ await window.storage.set(k,v); return; }catch(e){ showToast('Save failed — try again'); return; }
    }
    try{ localStorage.setItem('steady:'+k,v); }catch(e){ showToast('Save failed'); }
  }
};
async function loadState(){
  const p=await store.get('profile3'); if(p){ try{ profile=JSON.parse(p)||null; }catch(e){} }
  const e=await store.get('entries'); if(e){ try{ entries=JSON.parse(e)||[]; }catch(err){ entries=[]; } }
  const j=await store.get('journal'); if(j){ try{ journal=JSON.parse(j)||[]; }catch(err){ journal=[]; } }
  const st=await store.get('storms'); if(st){ try{ storms=JSON.parse(st)||[]; }catch(err){ storms=[]; } }
  const ln=await store.get('learn'); if(ln){ try{ learn=JSON.parse(ln)||null; }catch(err){ learn=null; } }
  const s=await store.get('settings'); if(s){ try{ settings=Object.assign(settings, JSON.parse(s)); }catch(err){} }
  const t=entries.find(x=>x.date===todayStr());
  if(t) todayDraft={mood:t.mood, energy:t.energy, note:t.note||'', done:new Set(t.done||[])};
  if(profile && !learn){ learn=deriveLearn(profile); await saveLearn(); }
  lastLevels=levelsBySource();
}

// =====================================================
// COURSE ENGINE
// =====================================================
function deriveLearn(p){
  // Journey = foundation first, then pattern courses ordered by quiz score
  const order=['found'];
  computeFocus(p.likert).filter(d=>d.score>=3).forEach(d=>{ if(COURSES.some(c=>c.id===d.id)) order.push(d.id); });
  return {order, active:{id:'found', start:todayStr()}, read:{}, completed:[]};
}
function courseById(id){ return COURSES.find(c=>c.id===id); }
function daysSince(dateStr){
  const a=new Date(dateStr+'T00:00:00'), b=new Date(todayStr()+'T00:00:00');
  return Math.max(0, Math.round((b-a)/864e5));
}
function unlockCount(course){
  if(!learn.active || learn.active.id!==course.id) return learn.completed.includes(course.id)?course.days.length:0;
  return Math.min(course.days.length, daysSince(learn.active.start)+1);
}
function todaysLesson(){
  if(!learn || !learn.active) return null;
  const c=courseById(learn.active.id);
  if(!c) return null;
  const unlocked=unlockCount(c);
  const read=learn.read[c.id]||[];
  for(let i=0;i<unlocked;i++){ if(!read.includes(i)) return {course:c, dayIdx:i, lesson:c.days[i]}; }
  return null;
}
async function markLessonRead(courseId, dayIdx){
  if(!learn.read[courseId]) learn.read[courseId]=[];
  if(!learn.read[courseId].includes(dayIdx)) learn.read[courseId].push(dayIdx);
  const c=courseById(courseId);
  if(learn.read[courseId].length>=c.days.length && !learn.completed.includes(courseId)){
    learn.completed.push(courseId);
    const next=learn.order.find(id=>!learn.completed.includes(id));
    learn.active = next ? {id:next, start:todayStr()} : null;
    await saveLearn();
    confetti();
    showToast('🎓 Course complete: '+c.title+'!');
    return true;
  }
  await saveLearn();
  return false;
}

// =====================================================
// ADAPTIVE ENGINE
// =====================================================
// 1. Completions per source (from all history) drive practice LEVELS.
function completionsBySource(){
  const c={};
  entries.forEach(e=>(e.done||[]).forEach(k=>{ const src=k.split('|')[0]; c[src]=(c[src]||0)+1; }));
  return c;
}
function levelsBySource(){
  const comps=completionsBySource(); const lv={};
  Object.keys(PRACTICES).forEach(src=>{
    const n=comps[src]||0;
    lv[src] = n>=LEVEL_THRESHOLDS[2]?2 : n>=LEVEL_THRESHOLDS[1]?1 : 0;
  });
  return lv;
}
// 2. Plan is COMPUTED fresh every day from profile + current levels,
//    so it evolves automatically as you complete work.
function activeSources(){
  const srcs=[];
  computeFocus(profile.likert).filter(d=>d.score>=3).slice(0,3).forEach(d=>srcs.push(d.id));
  profile.concerns.filter(c=>c!=='relationship' && PRACTICES[c]).forEach(c=>srcs.push(c));
  if(!srcs.length) srcs.push('stress');
  return srcs;
}
function currentPlan(){
  const cap=TIME_CAPS[profile.time]||3;
  const srcs=activeSources();
  const lv=levelsBySource();
  const out=[]; const used={};
  let i=0, guard=0;
  while(out.length<cap && guard<60){
    guard++;
    const src=srcs[i%srcs.length];
    const start=lv[src];
    const u=used[src]||0;
    const idx=Math.min(start+u, 2);
    if(u===0 || (start+u)<=2){
      if(!out.some(o=>o.src===src && o.idx===idx)){
        const pr=PRACTICES[src][idx];
        out.push({src, idx, key:src+'|'+idx, title:pr.title, min:pr.min, type:pr.type, body:pr.body, level:idx+1});
      }
      used[src]=u+1;
    }
    i++;
    if(i>srcs.length*3) break;
  }
  // Pair today's lesson with its exercise: it takes the lead slot
  const tl=learn ? todaysLesson() : null;
  if(tl && tl.lesson.ex){
    const ex=tl.lesson.ex;
    const pr=PRACTICES[ex.src] && PRACTICES[ex.src][ex.idx];
    if(pr){
      const key=ex.src+'|'+ex.idx;
      const item={src:ex.src, idx:ex.idx, key, title:pr.title, min:pr.min, type:pr.type, body:pr.body, level:ex.idx+1, fromLesson:true};
      const dup=out.findIndex(o=>o.key===key);
      if(dup>=0) out.splice(dup,1);
      const sameSrc=out.findIndex(o=>o.src===ex.src);
      if(sameSrc>=0) out.splice(sameSrc,1);
      out.unshift(item);
      while(out.length>cap) out.pop();
    }
  }
  return out;
}
// 3. Signals from recent data → adjustments & nudges shown on Today.
function adaptiveSignals(){
  const sigs=[];
  const last7=entries.filter(e=>e.date>=daysAgo(6));
  const moods=last7.filter(e=>e.mood).map(e=>e.mood);
  const recent=entries.slice().sort((a,b)=>b.date.localeCompare(a.date)).slice(0,3).filter(e=>e.mood);
  // Rough patch → offer gentler day
  if(recent.length>=2 && recent.every(e=>e.mood<=2)){
    sigs.push({type:'gentle', emoji:'💛', tint:'var(--sun-soft)',
      text:'The last couple of days look heavy. Today, doing ONE thing counts as a win — the self-compassion session might be the right one.',
      action:'Open self-compassion →', go:()=>{ view='calm'; render(); const m=MEDITATIONS.find(x=>x.id==='compassion'); startMeditation(m); }});
  }
  // Low completion → offer to shrink the plan
  const week=entries.filter(e=>e.date>=daysAgo(6));
  if(week.length>=4 && profile.time!=='5'){
    const planSize=currentPlan().length;
    const rate=week.reduce((a,e)=>a+(e.done||[]).length,0)/(week.length*planSize);
    if(rate<0.4){
      sigs.push({type:'shrink', emoji:'✂️', tint:'var(--sky-soft)',
        text:'You\'ve been completing under half the plan lately. That\'s a plan problem, not a you problem — want a smaller one?',
        action:'Shrink my plan →', go:async ()=>{ profile.time = profile.time==='20'?'10': profile.time==='flex'?'10':'5'; await saveProfile(); render(); showToast('Plan resized 👍'); }});
    }
  }
  // Distortion trend from thought records (last 14 days)
  const recs=journal.filter(j=>j.type==='record' && j.date>=new Date(Date.now()-14*864e5).toISOString() && j.chips && j.chips.length);
  if(recs.length>=3){
    const count={};
    recs.forEach(r=>r.chips.forEach(c=>count[c]=(count[c]||0)+1));
    const top=Object.keys(count).sort((a,b)=>count[b]-count[a])[0];
    if(count[top]>=3){
      const d=DISTORTIONS.find(x=>x.id===top);
      sigs.push({type:'distortion', emoji:'🔍', tint:'var(--purple-soft)',
        text:'Pattern spotted: "'+d.label+'" showed up in '+count[top]+' of your last '+recs.length+' thought records. When today\'s automatic thought arrives, check for that one first.'});
    }
  }
  // Storm patterns → name the dominant trigger + point at the matching work
  const recentStorms=storms.filter(s=>s.date>=new Date(Date.now()-7*864e5).toISOString());
  if(recentStorms.length>=3){
    const cnt={};
    recentStorms.forEach(s=>cnt[s.trigger]=(cnt[s.trigger]||0)+1);
    const topId=Object.keys(cnt).sort((a,b)=>cnt[b]-cnt[a])[0];
    const trg=TRIGGERS.find(t=>t.id===topId);
    if(trg && cnt[topId]>=2){
      const drops=recentStorms.filter(s=>s.trigger===topId && s.before!=null && s.after!=null);
      const avgDrop=drops.length? Math.round(drops.reduce((a,s)=>a+(s.before-s.after),0)/drops.length) : null;
      sigs.push({type:'storm', emoji:trg.emoji, tint:'var(--rose-soft)',
        text:'"'+trg.label+'" has been your biggest trigger this week ('+cnt[topId]+'×).'+(avgDrop!=null && avgDrop>0?' Riding it out is working — intensity drops ~'+avgDrop+' points each time.':'')+' Today\'s practices are the long-game version of that exact moment.'});
    }
  }
  // Mood improving → name it
  if(moods.length>=5){
    const prev=entries.filter(e=>e.date>=daysAgo(13)&&e.date<daysAgo(6)&&e.mood).map(e=>e.mood);
    if(prev.length>=3){
      const avgNow=moods.reduce((a,b)=>a+b,0)/moods.length, avgPrev=prev.reduce((a,b)=>a+b,0)/prev.length;
      if(avgNow-avgPrev>=0.6) sigs.push({type:'up', emoji:'📈', tint:'var(--mint-soft)', text:'Your average mood this week is up '+(avgNow-avgPrev).toFixed(1)+' points from last week. Whatever you\'re doing — the data says keep doing it.'});
    }
  }
  return sigs.slice(0,2);
}
// 4. Weekly insight summary for the Progress tab.
function weeklyInsights(){
  const out=[];
  const thisW=entries.filter(e=>e.date>=daysAgo(6));
  const prevW=entries.filter(e=>e.date>=daysAgo(13)&&e.date<daysAgo(6));
  const avg=a=>{ const m=a.filter(e=>e.mood).map(e=>e.mood); return m.length?m.reduce((x,y)=>x+y,0)/m.length:null; };
  const aN=avg(thisW), aP=avg(prevW);
  if(aN!=null&&aP!=null){
    const d=aN-aP;
    out.push(d>0.3?'Mood is trending up: '+aN.toFixed(1)+' avg vs '+aP.toFixed(1)+' last week. 📈':
             d<-0.3?'Mood dipped this week ('+aN.toFixed(1)+' vs '+aP.toFixed(1)+'). Worth being extra gentle — and if heaviness sticks around, talking to a professional is strength, not failure.':
             'Mood has been steady around '+aN.toFixed(1)+' this week.');
  }
  const comps=completionsBySource();
  const topSrc=Object.keys(comps).sort((a,b)=>comps[b]-comps[a])[0];
  if(topSrc) out.push('Most reps so far: '+srcMeta(topSrc).label+' ('+comps[topSrc]+' completions). That\'s where your levels will unlock first.');
  const lv=levelsBySource();
  const nextUp=activeSources().map(s=>({s, need:LEVEL_THRESHOLDS[Math.min(lv[s]+1,2)]-(comps[s]||0)})).filter(x=>x.need>0 && lv[x.s]<2).sort((a,b)=>a.need-b.need)[0];
  if(nextUp) out.push(nextUp.need+' more '+srcMeta(nextUp.s).label+' completion'+(nextUp.need===1?'':'s')+' until Level '+(lv[nextUp.s]+2)+' unlocks. 🔓');
  const recs=journal.filter(j=>j.type==='record').length;
  if(recs>0) out.push(recs+' thought record'+(recs===1?'':'s')+' on file. Rereading old ones is underrated — you\'ll see the same thought lose its grip over time.');
  if(learn){
    const totalRead=Object.values(learn.read).reduce((a,r)=>a+r.length,0);
    const totalDays=learn.order.reduce((a,id)=>{ const c=courseById(id); return a+(c?c.days.length:0); },0);
    if(totalRead>0 && totalDays>0) out.push('Journey: '+totalRead+' of '+totalDays+' lessons read'+(learn.completed.length?' · '+learn.completed.length+' course'+(learn.completed.length===1?'':'s')+' finished 🎓':'')+'.');
  }
  return out;
}
function srcMeta(src){
  if(PATTERNS[src]) return {label:PATTERNS[src].short, emoji:PATTERNS[src].emoji, tint:PATTERNS[src].tint};
  const c=CONCERNS.find(x=>x.id===src);
  return c?{label:c.label, emoji:c.emoji, tint:'var(--sky-soft)'}:{label:src, emoji:'🌱', tint:'var(--mint-soft)'};
}
function milestoneStats(){
  return {
    streak:computeStreak(),
    journalCount:journal.length,
    recordCount:journal.filter(j=>j.type==='record').length,
    medCount:settings.medCount||0,
    stormCount:storms.length,
    lessonsRead:learn?Object.values(learn.read).reduce((a,r)=>a+r.length,0):0,
    coursesDone:learn?learn.completed.length:0,
    maxLevel:Math.max.apply(null,[0].concat(Object.values(levelsBySource()))),
  };
